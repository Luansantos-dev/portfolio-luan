<div class="skill">
  <div class="skill__row">
    <span class="skill__name">{{ name }}</span>
    <span class="skill__value">{{ clamped }}%</span>
  </div>
  <div class="skill__track" role="presentation">
    <div
      class="skill__fill skill-bar__fill"
      [attr.data-level]="clamped"
      [style.width.%]="clamped"
    ></div>
  </div>
</div>
